id: ileapp
name: iLEAPP
summary: iOS Logs, Events, And Plists Parser for iOS device forensics and analysis.
description: |
  iLEAPP (iOS Logs, Events, And Plists Parser) is a tool for iOS device forensics and analysis. It parses various iOS artifacts including logs, events, and plist files to extract useful information for digital forensics and security analysis. iLEAPP helps investigators analyze iOS device data and extract evidence.
