id: wafw00f
name: Wafw00f
summary: Web Application Firewall detection tool for identifying and fingerprinting WAFs.
description: |
  Wafw00f is a Web Application Firewall (WAF) detection tool designed to identify and fingerprint WAFs protecting web applications. It can detect various WAF products including Cloudflare, AWS WAF, ModSecurity, and many others. Wafw00f helps security researchers understand what security controls are in place and can assist in bypassing WAF protections during security assessments.
