id: ophcrack
name: Ophcrack
summary: Windows password cracker based on rainbow tables for password recovery.
description: |
  Ophcrack is a Windows password cracker based on rainbow tables for password recovery. It can crack Windows password hashes using precomputed rainbow tables, making it faster than brute-force attacks. Ophcrack is useful for password recovery, security assessments, and demonstrating password security weaknesses.
