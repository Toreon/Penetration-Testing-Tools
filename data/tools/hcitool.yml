id: hcitool
name: hcitool
summary: Command-line utility for configuring Bluetooth connections and sending special commands to Bluetooth devices.
description: |
  hcitool is a command-line utility for configuring Bluetooth connections and sending special commands to Bluetooth devices. It's part of the BlueZ Bluetooth stack and provides low-level access to Bluetooth functionality. hcitool is useful for Bluetooth security testing, device analysis, and protocol research.
