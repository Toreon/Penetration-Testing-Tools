id: cape
name: CAPE
summary: Malware configuration extraction and automated analysis platform.
description: |
  CAPE (Config And Payload Extraction) is a malware configuration extraction and automated analysis platform. It extends Cuckoo Sandbox with additional analysis capabilities for extracting malware configurations and payloads. CAPE helps security researchers understand malware behavior and extract actionable intelligence.
