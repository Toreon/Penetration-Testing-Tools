id: bulk_extractor
name: Bulk Extractor
summary: Computer forensics tool that scans a disk image, file, or directory of files and extracts useful information without parsing the file system or file system structures.
description: |
  Bulk Extractor is a computer forensics tool that scans a disk image, file, or directory of files and extracts useful information without parsing the file system or file system structures. It can extract email addresses, credit card numbers, URLs, and other types of information from various file formats. Bulk Extractor is useful for digital forensics, firmware analysis, and security research.
