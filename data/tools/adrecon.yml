id: adrecon
name: ADRecon
summary: Active Directory reconnaissance tool for gathering information from AD environments.
description: |
  ADRecon is an Active Directory reconnaissance tool designed for gathering information from AD environments. It collects data about users, groups, computers, organizational units, and other AD objects to help security researchers understand the AD structure and identify potential security issues. ADRecon generates comprehensive reports in various formats for analysis.
