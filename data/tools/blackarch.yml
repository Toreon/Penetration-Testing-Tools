id: blackarch
name: BlackArch Linux
summary: Arch Linux-based penetration testing distribution for security researchers and penetration testers.
description: |
  BlackArch Linux is an Arch Linux-based penetration testing distribution for security researchers and penetration testers. It provides a large repository of security tools that can be installed individually or as groups. BlackArch can be installed on top of an existing Arch Linux installation or used as a standalone distribution. It's known for its extensive tool collection and rolling release model.
