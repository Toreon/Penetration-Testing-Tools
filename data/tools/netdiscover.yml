id: netdiscover
name: Netdiscover
summary: Active/passive network discovery tool for LAN scanning and host detection.
description: |
  Netdiscover is an active/passive network discovery tool designed for LAN scanning and host detection. It can discover hosts on a network using ARP requests or by passively monitoring network traffic. Netdiscover is useful for network reconnaissance, identifying active hosts, and mapping network topology in local area networks.
