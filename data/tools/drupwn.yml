id: drupwn
name: Drupwn
summary: Drupal security scanner for detecting vulnerabilities in Drupal installations.
description: |
  Drupwn is a Drupal security scanner designed to detect vulnerabilities in Drupal content management system installations. It can identify Drupal version information, enumerate modules and themes, detect known vulnerabilities, and perform security assessments. Drupwn helps security researchers and administrators identify security issues in Drupal-based websites.
