id: adexplorer
name: ADExplorer
summary: Advanced Active Directory viewer and editor for exploring AD structure and objects.
description: |
  ADExplorer is an advanced Active Directory viewer and editor from Sysinternals for exploring AD structure and objects. It provides a graphical interface to browse AD, view object properties, search for objects, and export AD data. ADExplorer is useful for AD administration, troubleshooting, and security research.
