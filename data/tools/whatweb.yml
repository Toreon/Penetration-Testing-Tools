id: whatweb
name: WhatWeb
summary: Web technology identifier that recognizes web technologies including content management systems, web servers, and JavaScript frameworks.
description: |
  WhatWeb is a web technology identifier that recognizes web technologies including content management systems, web servers, JavaScript frameworks, analytics tools, and more. It can identify over 1800 different web technologies by analyzing HTTP headers, HTML content, cookies, and other indicators. WhatWeb is useful for reconnaissance and understanding the technology stack of target web applications.
