id: androbugs
name: AndroBugs
summary: Android vulnerability scanner that focuses on security issues in Android applications.
description: |
  AndroBugs is an Android vulnerability scanner that focuses on security issues in Android applications. It can detect various security vulnerabilities including insecure data storage, insecure communications, weak cryptography, and other common Android security issues. AndroBugs helps security researchers identify security weaknesses in Android apps.
