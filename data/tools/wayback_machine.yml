id: wayback_machine
name: Wayback Machine
summary: Digital archive of the World Wide Web for viewing historical versions of websites and pages.
description: |
  Wayback Machine is a digital archive of the World Wide Web that allows you to view historical versions of websites and pages. It's useful for OSINT gathering, finding deleted content, researching website history, and discovering old endpoints or exposed information. Wayback Machine is maintained by the Internet Archive and is widely used in security research and reconnaissance.
