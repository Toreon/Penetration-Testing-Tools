id: zsteg
name: Zsteg
summary: PNG/BMP steganography detector for finding hidden data in PNG and BMP images.
description: |
  Zsteg is a PNG/BMP steganography detector for finding hidden data in PNG and BMP images. It can detect various steganographic techniques and extract hidden data from images. Zsteg is useful for steganography analysis and CTF challenges.
