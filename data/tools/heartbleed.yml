id: heartbleed
name: Heartbleed
summary: Heartbleed vulnerability scanner for detecting OpenSSL Heartbleed vulnerability.
description: |
  Heartbleed is a vulnerability scanner for detecting the OpenSSL Heartbleed vulnerability (CVE-2014-0160). It can test SSL/TLS servers for the Heartbleed vulnerability and demonstrate the security issue. This tool is useful for security assessments and vulnerability scanning.
