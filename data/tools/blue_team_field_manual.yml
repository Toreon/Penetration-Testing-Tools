id: blue_team_field_manual
name: Blue Team Field Manual
summary: Concise reference guide for blue team operations, incident response, and defensive security techniques.
description: |
  Blue Team Field Manual (BTFM) is a concise reference guide for blue team operations, incident response, and defensive security techniques. It provides quick reference information for common defensive commands, tools, and procedures used in security operations. The manual complements the Red Team Field Manual and is designed for incident responders and security analysts.
