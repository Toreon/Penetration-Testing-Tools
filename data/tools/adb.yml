id: adb
name: Android Debug Bridge (ADB)
summary: Command-line tool that enables communication with Android devices for debugging, app installation, and device management.
description: |
  Android Debug Bridge (ADB) is a command-line tool that enables communication with Android devices. It's part of the Android SDK platform tools and provides capabilities for debugging, app installation, file transfer, shell access, and device management. ADB is essential for Android security testing, mobile app development, and device analysis.
