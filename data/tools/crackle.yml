id: crackle
name: crackle
summary: Tool for cracking Bluetooth Low Energy (BLE) encryption, useful for BLE security assessment and research.
description: |
  crackle is a tool for cracking Bluetooth Low Energy (BLE) encryption. It can decrypt BLE encrypted connections by exploiting weaknesses in the pairing process. crackle is useful for BLE security assessment, protocol research, and understanding BLE security vulnerabilities.
