id: attifyos
name: AttifyOS
summary: IoT security testing platform and operating system for penetration testing of IoT devices.
description: |
  AttifyOS is an IoT security testing platform and operating system designed for penetration testing of IoT devices. It comes pre-installed with various tools for firmware analysis, hardware hacking, radio frequency analysis, and IoT device security testing. AttifyOS provides a comprehensive environment for IoT security research.
