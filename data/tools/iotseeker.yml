id: iotseeker
name: IoTSeeker
summary: IoT device scanner for discovering and testing Internet of Things devices.
description: |
  IoTSeeker is an IoT device scanner for discovering and testing Internet of Things devices. It can scan for IoT devices on networks, identify device types, and test for common vulnerabilities. IoTSeeker helps security researchers discover and assess the security of IoT devices in networks.
