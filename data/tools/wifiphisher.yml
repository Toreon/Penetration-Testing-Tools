id: wifiphisher
name: Wifiphisher
summary: Automated phishing attack tool for WiFi networks using rogue access points.
description: |
  Wifiphisher is an automated phishing attack tool for WiFi networks using rogue access points. It creates fake access points and performs automated phishing attacks to capture WiFi credentials. Wifiphisher is used for security testing and demonstrating WiFi security vulnerabilities.
