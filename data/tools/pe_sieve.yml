id: pe_sieve
name: PE-sieve
summary: PE file scanner for detecting and dumping in-memory payloads and malware.
description: |
  PE-sieve is a PE file scanner for detecting and dumping in-memory payloads and malware. It can scan running processes for suspicious PE files, detect code injection, and dump malicious payloads from memory. PE-sieve is useful for malware analysis and incident response.
