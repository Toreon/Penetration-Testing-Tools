id: trufflehog
name: TruffleHog
summary: Tool for finding secrets in git repositories and other data sources.
description: |
  TruffleHog is a tool for finding secrets in git repositories and other data sources. It can detect API keys, passwords, tokens, and other sensitive information using various detection methods. TruffleHog is useful for security testing and identifying exposed secrets.
