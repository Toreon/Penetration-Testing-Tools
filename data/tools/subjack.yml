id: subjack
name: Subjack
summary: Subdomain takeover tool for detecting vulnerable subdomains.
description: |
  Subjack is a subdomain takeover tool for detecting vulnerable subdomains. It can identify subdomains that are vulnerable to subdomain takeover attacks by checking for various service providers and configurations. Subjack is useful for security assessments and bug bounty hunting.
