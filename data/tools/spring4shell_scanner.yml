id: spring4shell_scanner
name: Spring4Shell-Scanner
summary: Scanner for detecting Spring4Shell vulnerability (CVE-2022-22965) in Spring Framework applications.
description: |
  Spring4Shell-Scanner is a scanner for detecting the Spring4Shell vulnerability (CVE-2022-22965) in Spring Framework applications. It can scan for vulnerable Spring applications and test for exploitation. Spring4Shell-Scanner is useful for security assessments and vulnerability detection.
