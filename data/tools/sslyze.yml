id: sslyze
name: SSLyze
summary: Fast and comprehensive SSL/TLS scanner for analyzing SSL/TLS configurations.
description: |
  SSLyze is a fast and comprehensive SSL/TLS scanner for analyzing SSL/TLS configurations. It can test SSL/TLS servers for various security issues including weak ciphers, certificate problems, and protocol vulnerabilities. SSLyze is useful for SSL/TLS security assessment and compliance checking.
