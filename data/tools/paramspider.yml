id: paramspider
name: Paramspider
summary: Parameter discovery tool for finding URL parameters in web applications.
description: |
  Paramspider is a parameter discovery tool for finding URL parameters in web applications. It can crawl websites and extract URL parameters that may be vulnerable to various attacks. Paramspider is useful for web application security testing and bug bounty hunting.
