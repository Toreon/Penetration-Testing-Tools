id: joomscan
name: Joomscan
summary: Joomla vulnerability scanner for detecting security issues in Joomla installations.
description: |
  Joomscan is a Joomla vulnerability scanner designed to detect security issues in Joomla content management system installations. It can identify outdated Joomla versions, vulnerable components, configuration issues, and known security vulnerabilities. Joomscan helps security researchers and administrators assess the security posture of Joomla-based websites.
