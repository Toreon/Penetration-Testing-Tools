id: gitleaks
name: GitLeaks
summary: Git secrets scanner for detecting hardcoded secrets in git repositories.
description: |
  GitLeaks is a Git secrets scanner for detecting hardcoded secrets in git repositories. It can scan git repositories for API keys, passwords, tokens, and other sensitive information. GitLeaks is useful for security testing and identifying exposed secrets in code repositories.
