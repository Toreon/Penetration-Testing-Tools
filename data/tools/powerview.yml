id: powerview
name: PowerView
summary: PowerShell tool for Active Directory enumeration and reconnaissance.
description: |
  PowerView is a PowerShell tool for Active Directory enumeration and reconnaissance. It provides various cmdlets for gathering information about AD environments, including users, groups, computers, shares, and other AD objects. PowerView is part of the PowerSploit framework and is widely used in penetration testing and security assessments.
