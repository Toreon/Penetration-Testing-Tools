id: trivy
name: Trivy
summary: Comprehensive security scanner for containers, filesystems, and Git repositories.
description: |
  Trivy is a comprehensive security scanner for containers, filesystems, and Git repositories. It detects vulnerabilities in container images, filesystem directories, and Git repositories. Trivy supports multiple vulnerability databases, can scan for misconfigurations, and integrates with CI/CD pipelines for continuous security scanning.
