id: unicornscan
name: Unicornscan
summary: Network port scanner with advanced capabilities for network reconnaissance.
description: |
  Unicornscan is a network port scanner with advanced capabilities for network reconnaissance. It provides asynchronous TCP and UDP scanning, service version detection, and OS fingerprinting. Unicornscan is designed to be fast and efficient, making it useful for large-scale network scanning and security assessments.
