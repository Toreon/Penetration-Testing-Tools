id: creepy
name: Creepy
summary: Geolocation OSINT tool for gathering geolocation-related information from online sources.
description: |
  Creepy is a geolocation OSINT tool for gathering geolocation-related information from online sources. It can collect geolocation data from social networks, images, and other online sources to map locations associated with targets. Creepy helps security researchers and investigators gather geolocation intelligence for security assessments.
