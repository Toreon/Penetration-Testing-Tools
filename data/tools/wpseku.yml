id: wpseku
name: WPSeku
summary: WordPress security scanner for detecting vulnerabilities in WordPress installations.
description: |
  WPSeku is a WordPress security scanner designed to detect vulnerabilities in WordPress installations. It can identify common WordPress security issues including outdated plugins, weak configurations, and known vulnerabilities. WPSeku helps security researchers and website administrators assess the security posture of WordPress sites.
