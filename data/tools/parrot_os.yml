id: parrot_os
name: Parrot OS
summary: Security-oriented Linux distribution designed for penetration testing, computer forensics, reverse engineering, and privacy protection.
description: |
  Parrot OS is a security-oriented Linux distribution designed for penetration testing, computer forensics, reverse engineering, and privacy protection. It's based on Debian and includes a comprehensive set of security tools. Parrot OS is an alternative to Kali Linux and is widely used by security professionals, penetration testers, and security researchers.
