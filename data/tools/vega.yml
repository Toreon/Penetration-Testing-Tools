id: vega
name: Vega
summary: Web vulnerability scanner and testing platform with GUI for security testing.
description: |
  Vega is a web vulnerability scanner and testing platform with a graphical user interface for security testing. It helps security researchers find and validate SQL injection, cross-site scripting (XSS), and other vulnerabilities in web applications. Vega includes a proxy for intercepting requests, a scanner for automated vulnerability detection, and various tools for manual testing.
