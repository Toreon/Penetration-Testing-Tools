id: security_onion
name: Security Onion
summary: Linux distribution for intrusion detection, network security monitoring, and log management.
description: |
  Security Onion is a Linux distribution for intrusion detection, network security monitoring, and log management. It includes tools like Snort, Suricata, Zeek, Wazuh, and Elastic Stack for comprehensive security monitoring. Security Onion is designed for security analysts and network defenders to detect and respond to security threats.
