id: waybackurls
name: Waybackurls
summary: Fetch URLs from Wayback Machine for historical URL discovery and reconnaissance.
description: |
  Waybackurls is a tool for fetching URLs from the Wayback Machine for historical URL discovery and reconnaissance. It can retrieve historical URLs and endpoints from archived web pages, helping security researchers discover hidden endpoints and attack surfaces. Waybackurls is useful for web application security testing and reconnaissance.
