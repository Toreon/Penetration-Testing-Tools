id: outguess
name: Outguess
summary: Universal steganographic tool for hiding data in images and extracting hidden data.
description: |
  Outguess is a universal steganographic tool for hiding data in images and extracting hidden data. It supports various image formats and steganographic techniques for embedding and extracting data. Outguess is useful for steganography research and security testing.
