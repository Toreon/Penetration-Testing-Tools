id: graphw00f
name: Graphw00f
summary: GraphQL fingerprinting and exploitation tool for security testing.
description: |
  Graphw00f is a GraphQL fingerprinting and exploitation tool designed for security testing. It can identify GraphQL implementations, detect introspection capabilities, and test for common vulnerabilities. Graphw00f helps security researchers understand GraphQL endpoint configurations and identify potential security weaknesses in GraphQL APIs.
