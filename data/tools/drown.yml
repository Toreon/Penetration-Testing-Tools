id: drown
name: DROWN
summary: DROWN attack scanner for detecting SSL/TLS servers vulnerable to the DROWN attack.
description: |
  DROWN is a vulnerability scanner for detecting SSL/TLS servers vulnerable to the DROWN attack (CVE-2016-0800). It can test SSL/TLS servers for the DROWN vulnerability and demonstrate the security issue. This tool is useful for security assessments and vulnerability scanning.
