id: rest_attacker
name: REST-Attacker
summary: REST API security testing framework for automated security assessment of RESTful APIs.
description: |
  REST-Attacker is a security testing framework designed specifically for RESTful APIs. It provides automated security assessment capabilities to identify vulnerabilities in REST API endpoints, including authentication bypass, authorization flaws, injection vulnerabilities, and other common API security issues. REST-Attacker supports various authentication methods and can be integrated into CI/CD pipelines for continuous security testing.
