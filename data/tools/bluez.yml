id: bluez
name: BlueZ
summary: Official Linux Bluetooth protocol stack that provides tools and libraries for Bluetooth device management and communication.
description: |
  BlueZ is the official Linux Bluetooth protocol stack that provides tools and libraries for Bluetooth device management and communication. It includes utilities like bluetoothctl, hcitool, and various daemons for Bluetooth functionality. BlueZ is essential for Bluetooth security testing, device analysis, and protocol research on Linux systems.
