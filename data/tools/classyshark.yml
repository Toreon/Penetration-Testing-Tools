id: classyshark
name: ClassyShark
summary: Android and Java bytecode viewer for analyzing APK and JAR files.
description: |
  ClassyShark is an Android and Java bytecode viewer for analyzing APK and JAR files. It provides a graphical interface to explore the structure of Android applications, view classes, methods, and resources. ClassyShark is useful for reverse engineering, security analysis, and understanding Android application internals.
