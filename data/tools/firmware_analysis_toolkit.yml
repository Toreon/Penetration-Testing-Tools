id: firmware_analysis_toolkit
name: Firmware Analysis Toolkit
summary: Framework for automated firmware analysis and security assessment of embedded devices.
description: |
  Firmware Analysis Toolkit (FAT) is a framework for automated firmware analysis and security assessment of embedded devices. It automates the process of extracting, analyzing, and emulating firmware images to identify security vulnerabilities. FAT helps security researchers analyze IoT and embedded device firmware efficiently.
