id: volatility
name: Volatility
summary: Memory forensics framework for analyzing volatile memory dumps from compromised systems.
description: |
  Volatility is a memory forensics framework for analyzing volatile memory dumps from compromised systems. It can extract information from memory images including running processes, network connections, registry hives, and other artifacts. Volatility is widely used in digital forensics and incident response for analyzing memory dumps.
