id: ssh_audit
name: ssh-audit
summary: SSH server auditing tool that tests SSH server configurations for security issues and policy compliance.
description: |
  ssh-audit is an SSH server auditing tool that tests SSH server configurations for security issues and policy compliance. It identifies weak algorithms, deprecated protocols, and misconfigurations in SSH implementations. ssh-audit helps security professionals assess SSH server security and ensure compliance with security policies.
