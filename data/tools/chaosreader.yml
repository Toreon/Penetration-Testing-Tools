id: chaosreader
name: Chaosreader
summary: Network traffic analyzer that reconstructs TCP/UDP sessions from packet captures.
description: |
  Chaosreader is a network traffic analyzer that reconstructs TCP/UDP sessions from packet captures. It can extract files, images, and other data from network traffic, making it useful for network forensics and security analysis. Chaosreader processes pcap files and generates HTML reports with reconstructed sessions and extracted content.
