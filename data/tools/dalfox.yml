id: dalfox
name: Dalfox
summary: Fast XSS parameter analysis and fuzzing tool for web application security testing.
description: |
  Dalfox is a fast XSS (Cross-Site Scripting) parameter analysis and fuzzing tool designed for web application security testing. It automatically discovers parameters in web applications and tests them for XSS vulnerabilities using various payloads and techniques. Dalfox supports multiple injection points, can bypass WAFs, and provides detailed reports of discovered vulnerabilities.
