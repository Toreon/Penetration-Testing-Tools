id: honggfuzz
name: Honggfuzz
summary: Security-oriented fuzzer with support for various fuzzing strategies.
description: |
  Honggfuzz is a security-oriented fuzzer with support for various fuzzing strategies including coverage-guided fuzzing, persistent mode, and hardware-based feedback. It can fuzz various types of applications and is designed to be efficient and effective at finding security vulnerabilities.
