id: zmap
name: Zmap
summary: Fast internet-wide scanner for large-scale network scanning and research.
description: |
  Zmap is a fast internet-wide scanner designed for large-scale network scanning and research. It can scan the entire IPv4 address space in under 45 minutes from a single machine, making it ideal for internet-wide studies and security research. Zmap is significantly faster than traditional scanners and is used for network discovery, port scanning, and security research at scale.
