id: apkid
name: APKiD
summary: Android application identifier for detecting packers, obfuscators, and protectors.
description: |
  APKiD is an Android application identifier that detects packers, obfuscators, and protectors used in Android applications. It can identify various tools and techniques used to protect or obfuscate Android apps, helping security researchers understand what protections are in place and how applications are structured.
