id: spiderfoot
name: SpiderFoot
summary: Open source intelligence automation tool that automatically queries over 100 public data sources to gather intelligence about IP addresses, domain names, email addresses, and more.
description: |
  SpiderFoot is an open source intelligence automation tool that automatically queries over 100 public data sources to gather intelligence about IP addresses, domain names, email addresses, names, and more. It provides a web-based interface and can be used for reconnaissance, threat intelligence, and security assessments. SpiderFoot helps automate OSINT gathering by aggregating data from multiple sources.
