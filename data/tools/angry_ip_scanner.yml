id: angry_ip_scanner
name: Angry IP Scanner
summary: Fast and friendly network scanner with GUI for network discovery and port scanning.
description: |
  Angry IP Scanner is a fast and friendly network scanner with a graphical user interface for network discovery and port scanning. It can scan IP addresses and ports, resolve hostnames, determine MAC addresses, and detect NetBIOS information. Angry IP Scanner is cross-platform and provides an intuitive interface for network administrators and security professionals.
