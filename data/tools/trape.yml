id: trape
name: Trape
summary: OSINT analysis and research tool for tracking people and gathering intelligence.
description: |
  Trape is an OSINT analysis and research tool for tracking people and gathering intelligence. It can track people across social networks, gather information from various sources, and build profiles of targets. Trape helps security researchers and investigators gather intelligence about individuals for security assessments and investigations.
