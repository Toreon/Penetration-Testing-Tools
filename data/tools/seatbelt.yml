id: seatbelt
name: Seatbelt
summary: C# security audit tool for Windows environments that collects security-relevant information.
description: |
  Seatbelt is a C# security audit tool for Windows environments that collects security-relevant information. It gathers information about system configuration, installed software, network configuration, user accounts, and other security-relevant data. Seatbelt is useful for security assessments, incident response, and system auditing.
