id: graphqlmap
name: GraphQLmap
summary: Scripting engine to interact with GraphQL endpoints for security testing.
description: |
  GraphQLmap is a scripting engine to interact with GraphQL endpoints for security testing. It provides an interactive shell to explore GraphQL schemas, perform introspection queries, and test for common GraphQL vulnerabilities such as introspection disclosure, injection attacks, and authorization bypasses. GraphQLmap helps security researchers and penetration testers identify security issues in GraphQL implementations.
