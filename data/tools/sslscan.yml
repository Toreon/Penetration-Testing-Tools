id: sslscan
name: sslscan
summary: Fast SSL scanner that tests SSL/TLS enabled services to discover supported cipher suites and identify weak configurations.
description: |
  sslscan is a fast SSL scanner that tests SSL/TLS enabled services to discover supported cipher suites, protocols, and identify weak configurations. It's designed to help security professionals assess the security of SSL/TLS implementations and identify vulnerabilities such as weak ciphers, deprecated protocols, and misconfigurations.
