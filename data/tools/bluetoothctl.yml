id: bluetoothctl
name: bluetoothctl
summary: Command-line utility for managing Bluetooth devices, included as part of the BlueZ Bluetooth stack.
description: |
  bluetoothctl is a command-line utility for managing Bluetooth devices, included as part of the BlueZ Bluetooth stack. It provides an interactive interface for scanning, pairing, connecting, and managing Bluetooth devices. bluetoothctl is essential for Bluetooth security testing and device management on Linux systems.
