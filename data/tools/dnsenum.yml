id: dnsenum
name: Dnsenum
summary: DNS enumeration tool for gathering DNS information and subdomain discovery.
description: |
  Dnsenum is a DNS enumeration tool designed for gathering DNS information and subdomain discovery. It can perform various DNS queries including zone transfers, reverse lookups, subdomain brute-forcing, and DNS record enumeration. Dnsenum is useful for reconnaissance and information gathering during security assessments.
