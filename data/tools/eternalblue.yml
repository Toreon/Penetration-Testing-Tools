id: eternalblue
name: EternalBlue
summary: SMB exploit scanner for detecting systems vulnerable to EternalBlue (MS17-010).
description: |
  EternalBlue is an SMB exploit scanner for detecting systems vulnerable to the EternalBlue exploit (MS17-010). It can scan for vulnerable SMB services and test for the vulnerability. This tool is useful for security assessments and vulnerability detection.
