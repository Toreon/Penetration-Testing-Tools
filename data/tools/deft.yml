id: deft
name: DEFT (Digital Evidence & Forensics Toolkit)
summary: Ubuntu-based Linux distribution designed for computer forensics, incident response, and digital evidence collection.
description: |
  DEFT (Digital Evidence & Forensics Toolkit) is an Ubuntu-based Linux distribution designed for computer forensics, incident response, and digital evidence collection. It provides a comprehensive set of forensic tools and utilities for analyzing digital evidence. DEFT is used by law enforcement, incident responders, and digital forensics professionals.
