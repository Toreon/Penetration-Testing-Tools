id: kubeaudit
name: Kubeaudit
summary: Kubernetes security auditor that checks for common security misconfigurations.
description: |
  Kubeaudit is a Kubernetes security auditor that checks for common security misconfigurations in Kubernetes clusters. It audits Kubernetes resources against security best practices and identifies potential security issues. Kubeaudit can be run as a command-line tool or integrated into CI/CD pipelines for continuous security auditing.
