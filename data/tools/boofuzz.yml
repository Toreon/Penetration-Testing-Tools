id: boofuzz
name: Boofuzz
summary: Network protocol fuzzer for testing network services and applications.
description: |
  Boofuzz is a network protocol fuzzer for testing network services and applications. It can fuzz network protocols by sending malformed or unexpected data to network services. Boofuzz is useful for finding vulnerabilities in network protocols and services through automated fuzzing.
