id: firmadyne
name: Firmadyne
summary: Firmware emulation framework for automated dynamic analysis of Linux-based firmware.
description: |
  Firmadyne is a firmware emulation framework for automated dynamic analysis of Linux-based firmware. It can extract, emulate, and analyze firmware images to identify security vulnerabilities and understand firmware behavior. Firmadyne helps security researchers perform dynamic analysis of embedded device firmware.
