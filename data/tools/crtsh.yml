id: crtsh
name: crt.sh
summary: Certificate Transparency log search engine for discovering SSL/TLS certificates and subdomains.
description: |
  crt.sh is a Certificate Transparency log search engine that allows you to search for SSL/TLS certificates by domain name, organization, or other criteria. It's useful for discovering subdomains, finding certificates issued to target organizations, and researching certificate information. crt.sh is widely used in reconnaissance and OSINT gathering.
