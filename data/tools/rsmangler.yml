id: rsmangler
name: RSMangler
summary: Wordlist generator that creates variations of words for password cracking.
description: |
  RSMangler is a wordlist generator that creates variations of words for password cracking. It can generate wordlist variations by applying common password patterns, character substitutions, and transformations. RSMangler helps security researchers create comprehensive wordlists for password cracking and security testing.
