id: xxd
name: xxd
summary: Command-line utility that creates a hex dump of a given file or standard input, and can also convert a hex dump back to binary.
description: |
  xxd is a command-line utility that creates a hex dump of a given file or standard input, and can also convert a hex dump back to binary. It's commonly used in reverse engineering, binary analysis, and digital forensics. xxd is part of the vim package and is available on most Unix-like systems.
