id: linkfinder
name: Linkfinder
summary: JavaScript endpoint discovery tool for finding endpoints in JavaScript files.
description: |
  Linkfinder is a JavaScript endpoint discovery tool for finding endpoints in JavaScript files. It can analyze JavaScript files and extract API endpoints, URLs, and other useful information. Linkfinder is useful for web application security testing and reconnaissance.
