id: caine
name: CAINE (Computer Aided INvestigative Environment)
summary: Ubuntu-based Linux distribution designed for digital forensics and computer investigation tasks.
description: |
  CAINE (Computer Aided INvestigative Environment) is an Ubuntu-based Linux distribution designed for digital forensics and computer investigation tasks. It provides a complete forensic environment with tools for evidence collection, analysis, and reporting. CAINE includes both open source and proprietary tools and is widely used by digital forensics investigators and law enforcement.
