summary: Free online hash cracking service that uses massive pre-computed lookup tables to crack password hashes.
description: |
  CrackStation is a free online hash cracking service that uses massive pre-computed lookup tables to crack password hashes. It supports various hash algorithms including MD5, SHA1, SHA256, and others. CrackStation is useful for password recovery, security testing, and digital forensics. The service uses large lookup tables to quickly identify common passwords.
