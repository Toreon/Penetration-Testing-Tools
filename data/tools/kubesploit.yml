id: kubesploit
name: Kubesploit
summary: Kubernetes post-exploitation framework for security testing and penetration testing.
description: |
  Kubesploit is a Kubernetes post-exploitation framework designed for security testing and penetration testing. It provides various modules for post-exploitation activities in Kubernetes environments, including privilege escalation, lateral movement, and data exfiltration. Kubesploit helps security researchers test Kubernetes security and demonstrate attack scenarios.
