id: exiftool
name: ExifTool
summary: Metadata extraction tool for reading and writing metadata in various file formats.
description: |
  ExifTool is a metadata extraction tool for reading and writing metadata in various file formats including images, videos, and documents. It can extract EXIF data, GPS coordinates, and other metadata from files. ExifTool is useful for digital forensics, OSINT, and security research.
