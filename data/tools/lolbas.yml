id: lolbas
name: LOLBAS (Living Off The Land Binaries And Scripts)
summary: Documented collection of Windows binaries, scripts, and libraries that can be used for Living Off The Land techniques.
description: |
  LOLBAS (Living Off The Land Binaries And Scripts) is a documented collection of Windows binaries, scripts, and libraries that can be used for Living Off The Land techniques. It provides information about legitimate Windows tools that can be abused for malicious purposes, making it valuable for both red teamers and blue teamers. Similar to GTFOBins but for Windows.
