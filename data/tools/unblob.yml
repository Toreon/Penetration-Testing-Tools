id: unblob
name: Unblob
summary: Fast and accurate extraction suite for analyzing unknown binary blobs and extracting embedded file systems and archives.
description: |
  Unblob is a fast and accurate extraction suite for analyzing unknown binary blobs and extracting embedded file systems and archives. It's designed to handle various file formats and compression algorithms commonly found in firmware images. Unblob is used for firmware analysis, digital forensics, and embedded device security assessment.
