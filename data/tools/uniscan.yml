id: uniscan
name: Uniscan
summary: Web application vulnerability scanner for detecting security issues in web applications.
description: |
  Uniscan is a web application vulnerability scanner designed to detect security issues in web applications. It performs various tests including directory enumeration, file discovery, and vulnerability detection. Uniscan can identify common vulnerabilities such as SQL injection, XSS, and other web application security issues through automated scanning.
categories:
  - web_app_scanner
  - vulnerability_scanner
