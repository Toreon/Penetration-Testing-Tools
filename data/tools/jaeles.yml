id: jaeles
name: Jaeles
summary: Powerful, flexible web application scanner framework for security testing.
description: |
  Jaeles is a powerful and flexible web application scanner framework designed for security testing. It provides a template-based approach to vulnerability scanning, allowing security researchers to create custom signatures for specific vulnerabilities. Jaeles supports various authentication methods, can handle complex web applications, and provides detailed reporting capabilities for security assessments.
