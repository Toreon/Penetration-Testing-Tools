id: samurai_web_testing
name: Samurai Web Testing Framework
summary: Linux distribution focused specifically on web application penetration testing and security assessment.
description: |
  Samurai Web Testing Framework is a Linux distribution focused specifically on web application penetration testing and security assessment. It includes a pre-configured collection of web application security tools and is designed to be used in a virtual machine environment. Samurai is ideal for web application security testing and training.
