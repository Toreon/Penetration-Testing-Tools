id: gtfobins
name: GTFOBins
summary: Curated list of Unix binaries that can be used to bypass local security restrictions in misconfigured systems.
description: |
  GTFOBins is a curated list of Unix binaries that can be used to bypass local security restrictions in misconfigured systems. It provides examples of how to use common Unix utilities for privilege escalation, file transfer, reverse shells, and other security testing scenarios. GTFOBins is an essential reference for penetration testers and security researchers working on Linux/Unix systems.
