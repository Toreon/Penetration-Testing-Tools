id: semgrep
name: Semgrep
summary: Static analysis tool for finding bugs and security vulnerabilities in code.
description: |
  Semgrep is a static analysis tool for finding bugs and security vulnerabilities in code. It uses pattern matching to identify security issues, bugs, and code quality problems across multiple programming languages. Semgrep is useful for code security analysis and vulnerability detection.
