id: cloudsplaining
name: Cloudsplaining
summary: Security assessment tool that identifies violations of least privilege in AWS IAM policies.
description: |
  Cloudsplaining is a security assessment tool that identifies violations of least privilege in AWS IAM policies. It analyzes IAM policies and generates a report showing which actions are allowed, which resources are accessible, and potential security risks. Cloudsplaining helps identify over-privileged IAM policies and improve AWS security posture.
