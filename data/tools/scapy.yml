id: scapy
name: Scapy
summary: Powerful Python library for packet manipulation, network discovery, and protocol testing.
description: |
  Scapy is a powerful Python library for packet manipulation, network discovery, and protocol testing. It can forge or decode packets of a wide number of protocols, send them on the wire, capture them, match requests and replies, and more. Scapy is used for network discovery, packet crafting, protocol testing, and security research.
