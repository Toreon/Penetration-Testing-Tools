id: infoga
name: Infoga
summary: Email OSINT tool for gathering information about email addresses from public sources.
description: |
  Infoga is an email OSINT tool for gathering information about email addresses from public sources. It can collect information from search engines, social networks, and other public sources to build profiles of email addresses. Infoga helps security researchers gather intelligence about email addresses for security assessments.
