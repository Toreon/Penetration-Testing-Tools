id: wget
name: wget
summary: Command-line utility for retrieving files using HTTP, HTTPS, and FTP protocols, supporting recursive downloads and various options.
description: |
  wget is a command-line utility for retrieving files using HTTP, HTTPS, and FTP protocols. It supports recursive downloads, bandwidth limiting, and various other options. wget is commonly used in penetration testing for downloading files, mirroring websites, and automating web requests. It's available on virtually all Unix-like systems.
