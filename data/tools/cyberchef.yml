id: cyberchef
name: CyberChef
summary: Web-based application for encoding, decoding, encrypting, decrypting, and data transformation operations commonly used in cybersecurity and digital forensics.
description: |
  CyberChef is a web-based application for encoding, decoding, encrypting, decrypting, and data transformation operations commonly used in cybersecurity and digital forensics. It provides a graphical interface with hundreds of operations that can be chained together to perform complex data transformations. CyberChef is widely used by security professionals, penetration testers, and digital forensics investigators.
