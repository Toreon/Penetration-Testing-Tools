id: pentoo
name: Pentoo Linux
summary: Gentoo-based penetration testing distribution with a focus on security tools and live CD/USB capabilities.
description: |
  Pentoo Linux is a Gentoo-based penetration testing distribution with a focus on security tools and live CD/USB capabilities. It includes a wide range of security tools and can be used as a live system or installed to disk. Pentoo is known for its customization capabilities and is popular among security professionals who prefer Gentoo's package management system.
