id: autopsy
name: Autopsy
summary: Digital forensics platform with graphical interface for analyzing disk images and file systems.
description: |
  Autopsy is a digital forensics platform with a graphical interface for analyzing disk images and file systems. It provides tools for file system analysis, keyword searching, timeline analysis, and artifact extraction. Autopsy is used in digital forensics investigations and incident response.
