id: dnschecker
name: DNS Checker
summary: Online DNS propagation checker and DNS lookup tool for verifying DNS records globally.
description: |
  DNS Checker is an online DNS propagation checker and DNS lookup tool that allows you to verify DNS records across multiple DNS servers worldwide. It's useful for checking DNS propagation, verifying DNS changes, and troubleshooting DNS issues. DNS Checker is commonly used in network security testing and DNS analysis.
