id: tshark
name: Tshark
summary: Command-line version of Wireshark for network protocol analysis and packet capture.
description: |
  Tshark is the command-line version of Wireshark, a network protocol analyzer. It can capture packets from a live network or read packets from a previously saved capture file. Tshark provides powerful filtering and analysis capabilities, making it ideal for automated network analysis, scripting, and command-line workflows. It supports hundreds of protocols and provides detailed packet inspection.
