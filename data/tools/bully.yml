id: bully
name: bully
summary: WPS (Wi-Fi Protected Setup) brute force attack tool that attempts to recover WPA/WPA2 passphrases.
description: |
  bully is a WPS (Wi-Fi Protected Setup) brute force attack tool that attempts to recover WPA/WPA2 passphrases by exploiting vulnerabilities in the WPS protocol. It's designed to be faster and more efficient than similar tools. bully is used for wireless security testing and WPS vulnerability assessment.
