id: stegsolve
name: Stegsolve
summary: Steganography analysis tool for analyzing images and detecting hidden data.
description: |
  Stegsolve is a steganography analysis tool for analyzing images and detecting hidden data. It provides various image analysis functions including color plane analysis, image filtering, and data extraction. Stegsolve is useful for steganography challenges and security research.
