id: ipinfo
name: IPinfo
summary: IP geolocation and information service for looking up IP address details and location data.
description: |
  IPinfo is an IP geolocation and information service that provides details about IP addresses including location, ISP, organization, and other metadata. It's useful for network reconnaissance, IP analysis, and geolocation research. IPinfo offers both free and paid tiers with API access for automated lookups.
