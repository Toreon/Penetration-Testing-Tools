id: angr
name: angr
summary: Binary analysis framework for symbolic execution and vulnerability research.
description: |
  angr is a binary analysis framework for symbolic execution and vulnerability research. It provides powerful capabilities for analyzing binaries, including symbolic execution, constraint solving, and program analysis. angr is used for vulnerability discovery, exploit generation, and automated reverse engineering tasks.
