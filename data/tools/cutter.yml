id: cutter
name: Cutter
summary: GUI for Radare2 reverse engineering framework with advanced binary analysis features.
description: |
  Cutter is a GUI for Radare2 reverse engineering framework with advanced binary analysis features. It provides a user-friendly interface for Radare2's powerful reverse engineering capabilities, including disassembly, decompilation, and binary analysis. Cutter makes Radare2 more accessible to reverse engineers who prefer graphical interfaces.
