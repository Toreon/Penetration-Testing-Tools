id: bluekeep
name: BlueKeep
summary: RDP vulnerability scanner for detecting systems vulnerable to BlueKeep (CVE-2019-0708).
description: |
  BlueKeep is an RDP vulnerability scanner for detecting systems vulnerable to the BlueKeep vulnerability (CVE-2019-0708). It can scan for vulnerable RDP services and test for the vulnerability. This tool is useful for security assessments and vulnerability detection.
