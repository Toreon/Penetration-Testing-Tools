id: pcapdroid
name: PCAPdroid
summary: Android application for capturing network traffic without root access, useful for network analysis and security testing.
description: |
  PCAPdroid is an Android application for capturing network traffic without root access. It can capture network packets and save them in PCAP format for analysis with tools like Wireshark. PCAPdroid is useful for network analysis, security testing, and mobile application security assessment.
