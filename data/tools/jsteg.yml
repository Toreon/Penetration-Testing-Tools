id: jsteg
name: Jsteg
summary: JPEG steganography tool for hiding data in JPEG images.
description: |
  Jsteg is a JPEG steganography tool for hiding data in JPEG images. It uses the least significant bit (LSB) technique to embed data in JPEG files. Jsteg is useful for steganography research and security testing.
