id: ike_scan
name: Ike-scan
summary: VPN scanner and testing tool for IPsec VPN discovery and security assessment.
description: |
  Ike-scan is a VPN scanner and testing tool designed for IPsec VPN discovery and security assessment. It can discover IKE (Internet Key Exchange) services, identify VPN implementations, and test for common VPN vulnerabilities. Ike-scan is useful for network reconnaissance and security testing of VPN infrastructure.
