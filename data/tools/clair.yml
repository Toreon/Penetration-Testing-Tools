id: clair
name: Clair
summary: Vulnerability static analysis for container images and application containers.
description: |
  Clair is a vulnerability static analysis tool for container images and application containers. It scans container images layer by layer to identify known vulnerabilities in the software stack. Clair provides an API for vulnerability scanning and can be integrated into container registries and CI/CD pipelines for continuous security monitoring.
