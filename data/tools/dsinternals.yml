id: dsinternals
name: DSInternals
summary: PowerShell module for Directory Services Internals and security research.
description: |
  DSInternals is a PowerShell module for Directory Services Internals and security research. It provides cmdlets for working with Active Directory database files, extracting password hashes, analyzing AD security, and performing various AD-related operations. DSInternals is useful for security research, forensics, and AD security assessment.
