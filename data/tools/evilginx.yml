id: evilginx
name: Evilginx
summary: Phishing framework with 2FA bypass capabilities for advanced phishing attacks.
description: |
  Evilginx is a phishing framework with 2FA bypass capabilities for advanced phishing attacks. It uses a man-in-the-middle approach to intercept authentication sessions, including those protected by two-factor authentication. Evilginx is used for security testing and demonstrating the effectiveness of phishing attacks against modern authentication systems.
