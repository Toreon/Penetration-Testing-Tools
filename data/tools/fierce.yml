id: fierce
name: Fierce
summary: DNS reconnaissance tool for locating non-contiguous IP space and hostnames.
description: |
  Fierce is a DNS reconnaissance tool designed for locating non-contiguous IP space and hostnames against specified domains. It uses various techniques including zone transfers, dictionary attacks, and reverse DNS lookups to discover subdomains and associated IP addresses. Fierce is useful for network reconnaissance and subdomain enumeration during security assessments.
