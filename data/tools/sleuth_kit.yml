id: sleuth_kit
name: Sleuth Kit
summary: Digital forensics toolkit for analyzing disk images and file systems.
description: |
  Sleuth Kit is a digital forensics toolkit for analyzing disk images and file systems. It provides command-line tools for file system analysis, file recovery, and artifact extraction. Sleuth Kit is the underlying toolkit used by Autopsy and other forensics tools.
