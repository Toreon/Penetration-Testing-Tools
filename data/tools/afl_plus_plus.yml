id: afl_plus_plus
name: AFL++
summary: Advanced fork of AFL with improved fuzzing capabilities and additional features.
description: |
  AFL++ is an advanced fork of AFL (American Fuzzy Lop) with improved fuzzing capabilities and additional features. It includes various improvements, new mutation strategies, and better performance compared to the original AFL. AFL++ is actively maintained and provides enhanced fuzzing capabilities for security research.
