id: nrf_connect
name: nRF Connect
summary: Mobile application for scanning, discovering, and interacting with Bluetooth Low Energy (BLE) devices.
description: |
  nRF Connect is a mobile application for scanning, discovering, and interacting with Bluetooth Low Energy (BLE) devices. It's developed by Nordic Semiconductor and provides comprehensive BLE testing capabilities. nRF Connect is useful for Bluetooth security testing, IoT device analysis, and BLE protocol research.
