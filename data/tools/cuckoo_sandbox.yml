id: cuckoo_sandbox
name: Cuckoo Sandbox
summary: Automated malware analysis system for analyzing suspicious files and URLs.
description: |
  Cuckoo Sandbox is an automated malware analysis system for analyzing suspicious files and URLs. It provides automated dynamic analysis of malware in isolated environments, generating detailed reports of malware behavior. Cuckoo Sandbox is widely used in malware research, incident response, and security analysis.
