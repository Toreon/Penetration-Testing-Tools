id: secretfinder
name: SecretFinder
summary: Tool for finding API keys and secrets in JavaScript files.
description: |
  SecretFinder is a tool for finding API keys and secrets in JavaScript files. It can analyze JavaScript files and extract API keys, tokens, and other sensitive information. SecretFinder is useful for security testing and identifying exposed secrets in web applications.
