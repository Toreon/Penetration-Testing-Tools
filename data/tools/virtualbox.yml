id: virtualbox
name: VirtualBox
summary: Cross-platform virtualization software that allows running multiple operating systems on a single machine.
description: |
  VirtualBox is a cross-platform virtualization software that allows running multiple operating systems on a single machine. It's widely used for creating isolated testing environments, running different operating systems, and security research. VirtualBox is free and open source, making it popular among security professionals and developers.
