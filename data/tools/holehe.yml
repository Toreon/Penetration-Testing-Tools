id: holehe
name: Holehe
summary: Email checker tool that checks if an email is attached to an account on various sites.
description: |
  Holehe is an email checker tool that checks if an email is attached to an account on various sites. It can identify which online services and platforms are associated with a given email address, helping with OSINT gathering and account enumeration. Holehe is useful for security research and social engineering assessments.
