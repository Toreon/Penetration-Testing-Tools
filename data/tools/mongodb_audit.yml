id: mongodb_audit
name: MongoDB-Audit
summary: MongoDB security auditing tool for assessing MongoDB database security configurations.
description: |
  MongoDB-Audit is a MongoDB security auditing tool for assessing MongoDB database security configurations. It can check for common security misconfigurations, weak authentication, and other security issues in MongoDB deployments. MongoDB-Audit helps security professionals assess the security posture of MongoDB databases.
