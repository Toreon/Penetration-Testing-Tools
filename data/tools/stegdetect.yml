id: stegdetect
name: Stegdetect
summary: Steganography detection tool for identifying steganographic content in images.
description: |
  Stegdetect is a steganography detection tool for identifying steganographic content in images. It can detect various steganographic techniques including jsteg, outguess, and others. Stegdetect is useful for steganography analysis and security research.
