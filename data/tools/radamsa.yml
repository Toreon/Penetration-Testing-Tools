id: radamsa
name: Radamsa
summary: General-purpose fuzzer for generating test cases and finding bugs.
description: |
  Radamsa is a general-purpose fuzzer for generating test cases and finding bugs. It can mutate input data in various ways to create test cases for fuzzing applications. Radamsa is useful for fuzzing file formats, network protocols, and other types of input data to find security vulnerabilities.
