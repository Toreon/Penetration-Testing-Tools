id: king_phisher
name: King Phisher
summary: Phishing campaign toolkit for creating and managing phishing campaigns for security testing.
description: |
  King Phisher is a phishing campaign toolkit for creating and managing phishing campaigns for security testing. It provides a server and client application for creating realistic phishing campaigns, tracking user interactions, and managing templates. King Phisher is used for security awareness training and phishing simulation exercises.
