id: w3af
name: W3af
summary: Web Application Attack and Audit Framework for automated security testing.
description: |
  W3af (Web Application Attack and Audit Framework) is a comprehensive web application security testing framework. It provides automated vulnerability scanning, exploitation capabilities, and security assessment tools. W3af includes plugins for discovering vulnerabilities such as SQL injection, XSS, CSRF, and many others. It features both a command-line interface and a web-based GUI for ease of use.
