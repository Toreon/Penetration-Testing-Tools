id: libfuzzer
name: LibFuzzer
summary: In-process fuzzing engine integrated with LLVM for fuzzing C/C++ code.
description: |
  LibFuzzer is an in-process fuzzing engine integrated with LLVM for fuzzing C/C++ code. It performs coverage-guided fuzzing and is designed to be fast and efficient. LibFuzzer is part of the LLVM project and is widely used for fuzzing libraries and applications written in C/C++.
