id: afl
name: AFL
summary: American Fuzzy Lop fuzzer for automated software testing and vulnerability discovery.
description: |
  AFL (American Fuzzy Lop) is a security-oriented fuzzer for automated software testing and vulnerability discovery. It uses genetic algorithms and code coverage feedback to efficiently find bugs and security vulnerabilities in software. AFL is widely used for fuzzing applications and discovering security issues.
