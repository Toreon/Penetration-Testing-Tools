id: mitmproxy
name: Mitmproxy
summary: Interactive HTTP proxy for intercepting, inspecting, and modifying HTTP/HTTPS traffic.
description: |
  Mitmproxy is an interactive HTTP proxy for intercepting, inspecting, and modifying HTTP/HTTPS traffic. It provides a command-line interface and web interface for analyzing network traffic. Mitmproxy is useful for web application security testing, debugging, and traffic analysis.
