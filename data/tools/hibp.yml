id: hibp
name: Have I Been Pwned (HIBP)
summary: Free online service that allows users to check if their email addresses or passwords have been compromised in data breaches.
description: |
  Have I Been Pwned (HIBP) is a free online service created by security researcher Troy Hunt that allows users to check if their email addresses or passwords have been compromised in data breaches. It provides a searchable database of breached accounts and compromised credentials. HIBP is widely used by security professionals, organizations, and individuals to assess breach exposure and improve security posture.
