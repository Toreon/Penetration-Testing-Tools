id: whois
name: whois
summary: Command-line utility for querying WHOIS databases to retrieve domain registration and ownership information.
description: |
  whois is a command-line utility for querying WHOIS databases to retrieve domain registration and ownership information. It's a standard tool available on most Unix-like systems and provides information about domain names, IP addresses, and autonomous system numbers. whois is essential for OSINT gathering, domain research, and network reconnaissance.
