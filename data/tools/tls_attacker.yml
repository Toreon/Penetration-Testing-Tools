id: tls_attacker
name: TLS-Attacker
summary: TLS protocol testing framework for analyzing and testing TLS implementations.
description: |
  TLS-Attacker is a TLS protocol testing framework for analyzing and testing TLS implementations. It can perform various TLS protocol tests, fuzzing, and security analysis. TLS-Attacker is useful for TLS security research and vulnerability discovery.
