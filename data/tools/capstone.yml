id: capstone
name: Capstone
summary: Multi-architecture disassembly framework for reverse engineering and binary analysis.
description: |
  Capstone is a multi-architecture disassembly framework for reverse engineering and binary analysis. It provides a lightweight, multi-platform disassembly engine that supports many architectures including x86, ARM, MIPS, and PowerPC. Capstone is used as a library in various reverse engineering tools and security research projects.
