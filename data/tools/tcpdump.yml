id: tcpdump
name: Tcpdump
summary: Command-line packet analyzer for network traffic capture and analysis.
description: |
  Tcpdump is a powerful command-line packet analyzer for network traffic capture and analysis. It allows users to capture and display TCP/IP and other packets being transmitted or received over a network. Tcpdump is widely used for network troubleshooting, security analysis, and protocol debugging. It provides detailed packet inspection capabilities and supports various output formats.
