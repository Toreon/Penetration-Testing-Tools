id: curl
name: curl
summary: Command-line tool and library for transferring data with URLs, supporting various protocols including HTTP, HTTPS, FTP, and more.
description: |
  curl is a command-line tool and library for transferring data with URLs, supporting various protocols including HTTP, HTTPS, FTP, SFTP, and more. It's one of the most commonly used utilities in penetration testing for making HTTP requests, testing web applications, and transferring files. curl is available on virtually all Unix-like systems and is essential for security testing workflows.
