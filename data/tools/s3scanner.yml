id: s3scanner
name: S3Scanner
summary: Tool to find open S3 buckets and dump their contents for security assessment.
description: |
  S3Scanner is a tool designed to find open S3 buckets and dump their contents for security assessment. It can scan for publicly accessible S3 buckets, enumerate bucket contents, and identify misconfigured buckets. S3Scanner helps security researchers identify exposed cloud storage and assess the security of S3 bucket configurations.
