id: kube_hunter
name: Kube-hunter
summary: Kubernetes penetration testing tool for finding security issues in Kubernetes clusters.
description: |
  Kube-hunter is a Kubernetes penetration testing tool designed for finding security issues in Kubernetes clusters. It hunts for security weaknesses in Kubernetes clusters and reports them. Kube-hunter can run as a pod inside the cluster or as a standalone tool, and it tests for various misconfigurations and vulnerabilities in Kubernetes deployments.
