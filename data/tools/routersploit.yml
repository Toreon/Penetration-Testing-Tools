id: routersploit
name: RouterSploit
summary: Exploitation framework for embedded devices and routers.
description: |
  RouterSploit is an exploitation framework for embedded devices and routers. It provides various exploits, scanners, and payloads for testing the security of routers and embedded devices. RouterSploit helps security researchers identify and exploit vulnerabilities in network devices.
