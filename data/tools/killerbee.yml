id: killerbee
name: KillerBee
summary: Framework for testing ZigBee and IEEE 802.15.4 networks, providing tools for security assessment and protocol analysis.
description: |
  KillerBee is a framework for testing ZigBee and IEEE 802.15.4 networks. It provides tools for capturing, analyzing, and attacking ZigBee networks. KillerBee is useful for IoT security research, wireless protocol testing, and ZigBee network security assessment.
