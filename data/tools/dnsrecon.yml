id: dnsrecon
name: Dnsrecon
summary: DNS enumeration script for comprehensive DNS reconnaissance and information gathering.
description: |
  Dnsrecon is a DNS enumeration script designed for comprehensive DNS reconnaissance and information gathering. It can perform various DNS operations including zone transfers, reverse lookups, subdomain brute-forcing, and DNS record enumeration. Dnsrecon provides detailed DNS information useful for security assessments and penetration testing.
