id: nosqlattack
name: NoSQLAttack
summary: NoSQL injection framework for testing and exploiting NoSQL database vulnerabilities.
description: |
  NoSQLAttack is a NoSQL injection framework for testing and exploiting NoSQL database vulnerabilities. It can test for various NoSQL injection vulnerabilities including MongoDB, CouchDB, and other NoSQL databases. NoSQLAttack helps security researchers identify and exploit NoSQL injection vulnerabilities.
